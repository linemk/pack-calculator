<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Packs Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container { width: 100%; max-width: 560px; }

    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 2rem; }
    h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 1rem; }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      background: #eef2ff;
      border: 1px solid #c7d2fe;
      border-radius: 4px;
      padding: 0.25rem 0.5rem;
      font-size: 0.875rem;
      font-weight: 500;
    }

    .tag button {
      background: none;
      border: none;
      cursor: pointer;
      color: #6366f1;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0 0 2px;
    }

    .tag button:hover { color: #dc2626; }

    .row { display: flex; gap: 0.5rem; margin-bottom: 0.75rem; }

    input[type="number"] {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      font-size: 1rem;
      width: 100%;
      outline: none;
    }

    input[type="number"]:focus { border-color: #6366f1; box-shadow: 0 0 0 2px #eef2ff; }

    button.primary {
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
    }

    button.primary:hover { background: #15803d; }
    button.primary:disabled { background: #9ca3af; cursor: not-allowed; }

    button.secondary {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1rem;
      font-size: 0.95rem;
      cursor: pointer;
      white-space: nowrap;
    }

    button.secondary:hover { background: #4f46e5; }

    .error { color: #dc2626; font-size: 0.875rem; margin-top: 0.5rem; }
    .success { color: #16a34a; font-size: 0.875rem; margin-top: 0.5rem; }

    table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
    th { text-align: left; padding: 0.5rem 0.75rem; background: #f3f4f6; border: 1px solid #e5e7eb; font-size: 0.875rem; }
    td { padding: 0.5rem 0.75rem; border: 1px solid #e5e7eb; }
    tfoot td { font-weight: 600; background: #f9fafb; }

    .hidden { display: none; }
  </style>
</head>
<body>
<div class="container">
  <h1>Order Packs Calculator</h1>

  <div class="card">
    <h2>Pack Sizes</h2>
    <div class="tag-list" id="tag-list"></div>
    <div class="row">
      <input type="number" id="new-size" placeholder="Add pack size…" min="1" />
      <button class="secondary" onclick="addSize()">Add</button>
    </div>
    <button class="primary" onclick="saveSizes()">Save pack sizes</button>
    <div id="pack-msg"></div>
  </div>

  <div class="card">
    <h2>Calculate packs for order</h2>
    <div class="row">
      <input type="number" id="order-input" placeholder="Number of items…" min="1" />
      <button class="primary" onclick="calculate()">Calculate</button>
    </div>
    <div id="calc-msg"></div>
    <div id="result" class="hidden">
      <table>
        <thead><tr><th>Pack size</th><th>Quantity</th></tr></thead>
        <tbody id="result-body"></tbody>
        <tfoot><tr><td>Total items</td><td id="result-total"></td></tr></tfoot>
      </table>
    </div>
  </div>
</div>

<script>
  let sizes = [];

  async function loadSizes() {
    const res = await fetch('/api/packs');
    const data = await res.json();
    sizes = data.sizes || [];
    renderTags();
  }

  function renderTags() {
    const list = document.getElementById('tag-list');
    list.innerHTML = '';
    [...sizes].sort((a, b) => a - b).forEach(s => {
      const tag = document.createElement('span');
      tag.className = 'tag';
      tag.innerHTML = `${s} <button onclick="removeSize(${s})" title="Remove">×</button>`;
      list.appendChild(tag);
    });
  }

  function addSize() {
    const input = document.getElementById('new-size');
    const v = parseInt(input.value, 10);
    if (!v || v <= 0) return;
    if (!sizes.includes(v)) {
      sizes.push(v);
      renderTags();
    }
    input.value = '';
    input.focus();
  }

  document.getElementById('new-size').addEventListener('keydown', e => {
    if (e.key === 'Enter') addSize();
  });

  function removeSize(s) {
    sizes = sizes.filter(x => x !== s);
    renderTags();
  }

  async function saveSizes() {
    const msg = document.getElementById('pack-msg');
    msg.textContent = '';
    try {
      const res = await fetch('/api/packs', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sizes }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      sizes = data.sizes;
      renderTags();
      msg.className = 'success';
      msg.textContent = 'Saved!';
    } catch (e) {
      msg.className = 'error';
      msg.textContent = e.message;
    }
  }

  async function calculate() {
    const msg = document.getElementById('calc-msg');
    const result = document.getElementById('result');
    msg.textContent = '';
    result.classList.add('hidden');

    const order = parseInt(document.getElementById('order-input').value, 10);
    if (!order || order <= 0) {
      msg.className = 'error';
      msg.textContent = 'Enter a valid order amount.';
      return;
    }

    try {
      const res = await fetch('/api/calculate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');

      const tbody = document.getElementById('result-body');
      tbody.innerHTML = '';
      Object.entries(data.packs)
        .sort(([a], [b]) => parseInt(b) - parseInt(a))
        .forEach(([size, qty]) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${size}</td><td>${qty}</td>`;
          tbody.appendChild(tr);
        });
      document.getElementById('result-total').textContent = data.total_items;
      result.classList.remove('hidden');
    } catch (e) {
      msg.className = 'error';
      msg.textContent = e.message;
    }
  }

  loadSizes();
</script>
</body>
</html>
